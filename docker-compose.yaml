name: idporten
networks:
  idporten:
    name: idporten

services:
  democlient:
    build:
      context: .
      dockerfile: docker/dev.Dockerfile
      args:
        GIT_PACKAGE_TOKEN: ${GIT_PACKAGE_TOKEN}
        GIT_PACKAGE_USERNAME: ${GIT_PACKAGE_USERNAME}
    environment:
      spring_profiles_active: idporten, docker
      # spring_profiles_active: ansattporten,docker 
      # spring_profiles_active: eidas, eidas-test
    ports:
      - "7074:7074"
      - "5888:5888"
    networks:
      - idporten
    entrypoint: "/bin/bash -c"
    command:
      - |
        java -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5888 -jar application.jar

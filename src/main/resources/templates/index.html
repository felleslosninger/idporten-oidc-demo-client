<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      lang="nn">
<head th:replace="~{fragments/header::head}"/>
<body>
<div class="container" role="main">
    <h1 th:replace="~{fragments/header::heading}"></h1>
    <form id="authorizationRequestForm" action="#" th:action="@{/authorize}" th:object="${authorizationRequest}" method="post">

        <div class="ds-card" id="authorizationRequestAccordion">
            <details class="ds-details" data-variant="default">
                <summary role="button" aria-expanded="false" slot="summary" tabindex="0" class="details-heading" id="authorizationRequestHeading"
                aria-controls="authorizationRequest" >
                    Authorization request
                </summary>
                <div id="authorizationRequest"
                     aria-labelledby="authorizationRequestHeading" data-bs-parent="#authorizationRequestAccordion">
                    <div class="details-form">
                        <div class="ds-field">
                            <label class="ds-label"   th:for="scopes">Scope (scope)</label>
                            <input type="text" th:field="*{scopes}" class=" ds-input"/>
                        </div>
                        <div th:if="${features.isAuthorizationDetailsEnabled()}" class="ds-field">
                            <label class="ds-label" th:for="authorizationDetails">Authorization details (authorization_details)</label>
                            <input type="text" th:field="*{authorizationDetails}" class="form-control ds-input"/>
                        </div>
                        <div class="ds-field">
                            <label class="ds-label" th:for="acrValues" th:text="'Acr Supported Values (acr_values)' + *{supportedAcrValues}"></label>
                            <input type="text" th:field="*{acrValues}" class="form-control ds-input"/>
                        </div>
                        <div class="ds-field">
                            <label class="ds-label" th:for="uiLocales">Locale (ui_locales)</label>
                            <input type="text" th:field="*{uiLocales}" class="form-control ds-input"/>
                        </div>
                        <div class="ds-field">
                            <label class="ds-label" th:for="prompt">Prompt (prompt)</label>
                            <input type="text" th:field="*{prompt}" class="form-control ds-input"/>
                        </div>
                        <div class="ds-field">
                            <label class="ds-label" th:for="state">State (state)</label>
                            <input type="text" th:field="*{state}" class="form-control ds-input"/>
                        </div>
                        <div class="ds-field">
                            <label class="ds-label" th:for="nonce">Nonce (nonce)</label>
                            <input type="text" th:field="*{nonce}" class="form-control ds-input"/>
                        </div>
                        <div class="ds-field">
                            <label class="ds-label" th:for="codeVerifier">PKCE Code verifier used to compute Code challenge (code_challenge)</label>
                            <input type="text" th:field="*{codeVerifier}" class="form-control ds-input"/>
                        </div>
                        <div class="ds-field">
                            <label class="ds-label" th:for="codeChallengeMethod">PKCE Code challenge method (code_challenge_method)</label>
                            <input type="text" th:field="*{codeChallengeMethod}" class="form-control ds-input"/>
                        </div>
                    </div>
                </div>
            </details>
        </div>

        <br/>
        <button type="submit" class="ds-button" role="button" data-variant="primary">Login</button>
        <button type="button" class="ds-button" data-variant="secondary" onclick="togglePermlink()">Create permlink</button>
    </form>

    <div id="permlinkSection" style="display:none; margin-top: 1rem;">
        <div class="ds-field">
            <label class="ds-label">Permlink</label>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
                <input type="text" id="permlinkUrl" class="ds-input" readonly style="flex: 1;" />
                <button type="button" class="ds-button" data-variant="secondary" onclick="copyPermlink()">Copy</button>
            </div>
        </div>
    </div>

    <script th:src="@{/permlink.js}"></script>
</div>

<div th:replace="~{fragments/footer::scripts}"/>

</body>
</html>

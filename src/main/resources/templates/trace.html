<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      lang="nn">

<head th:replace="~{fragments/header::head}"/>
<body>
<div class="container">
    <h1 th:replace="~{fragments/header::heading}"></h1>

    <div class="ds-alert" data-color="success" role="alert">
        Current protocol trace.
    </div>

    <div th:insert="~{fragments/protocoltrace::protocoltrace}" />
    <br/>
    <a class="btn btn-primary" th:href="@{/}" role="button">Back</a>
    <a class="btn btn-secondary" th:href="@{/trace/clear}" role="button">Clear trace</a>
</div>

<div th:replace="~{fragments/footer::scripts}"/>

</body>
</html>

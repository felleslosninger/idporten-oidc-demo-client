<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      lang="nn">

<head th:replace="~{fragments/header::head}"/>
<body>
<div class="container">
    <h1 th:replace="~{fragments/header::heading}"></h1>

    <div th:if="${personIdentifier}" class="ds-alert" data-color='success' role="alert">
        You are logged in as <span th:text="${personIdentifier}" th:remove="tag">personidentifier</span>.
    </div>
<br/>
    <div th:insert="~{fragments/protocoltrace::protocoltrace}" />


<br/>
<div class="buttongroup">
    <a  th:href="@{/}" class="ds-button" data-variant="primary">Back</a>
    <a  th:href="@{/logout}" class="ds-button" data-variant="primary">Logout</a>
</div>

<div th:replace="~{fragments/footer::scripts}"/>

</body>
</html>

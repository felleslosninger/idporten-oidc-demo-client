<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

<body>

<summary role="button" aria-expanded="false" slot="summary" tabindex="0" class="details-heading" id="authorizationRequestHeading"
         aria-controls="authorizationRequest" >
    Authorization request
</summary>

<div th:fragment="protocoltrace" >
    <div th:if="${ session?.protocolTrace?.allInteraction?.size > 0 }"  id="protocolTrace" class="ds-card">
        <details class="ds-details" th:each="interaction: ${session.protocolTrace.allInteraction}">
            <summary th:id="'header' + ${interaction.id}" class="details-heading" role='button'>
                <p th:text="${interaction.text}" th:remove="tag"/>
                <span th:if="${#objects.nullSafe(interaction.warningLevel, false)}" th:switch="${interaction.warningLevel}" >
                        <i th:case="${T(no.idporten.tools.oidc.democlient.util.WarningLevel).WARNING}" data-color="warning">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path fill-rule="evenodd" clip-rule="evenodd" d="M11.9999 2.25C12.273 2.25 12.5244 2.3984 12.6565 2.63743L22.1827 19.8874C22.311 20.1198 22.307 20.4026 22.1721 20.6312C22.0372 20.8597 21.7916 21 21.5262 21H2.47363C2.20823 21 1.96259 20.8597 1.82771 20.6312C1.69283 20.4026 1.68879 20.1198 1.8171 19.8874L11.3434 2.63743C11.4754 2.3984 11.7269 2.25 11.9999 2.25ZM12.001 8.75C12.4152 8.75 12.751 9.08579 12.751 9.5V13.5C12.751 13.9142 12.4152 14.25 12.001 14.25C11.5868 14.25 11.251 13.9142 11.251 13.5V9.5C11.251 9.08579 11.5868 8.75 12.001 8.75ZM11.001 16.5C11.001 15.9477 11.4487 15.5 12.001 15.5C12.5533 15.5 13.001 15.9477 13.001 16.5C13.001 17.0523 12.5533 17.5 12.001 17.5C11.4487 17.5 11.001 17.0523 11.001 16.5Z" fill="var(--ds-color-base-default)"/>
                            </svg>
                        </i>
                        <i th:case="${T(no.idporten.tools.oidc.democlient.util.WarningLevel).ERROR}" data-color="danger">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path fill-rule="evenodd" clip-rule="evenodd" d="M7.74175 2.46967C7.8824 2.32902 8.07317 2.25 8.27208 2.25L15.7279 2.25C15.9268 2.25 16.1176 2.32902 16.2583 2.46967L21.5303 7.74175C21.671 7.8824 21.75 8.07317 21.75 8.27208V15.7279C21.75 15.9268 21.671 16.1176 21.5303 16.2583L16.2583 21.5303C16.1176 21.671 15.9268 21.75 15.7279 21.75H8.27208C8.07316 21.75 7.8824 21.671 7.74175 21.5303L2.46967 16.2583C2.32902 16.1176 2.25 15.9268 2.25 15.7279L2.25 8.27208C2.25 8.07317 2.32902 7.8824 2.46967 7.74175L7.74175 2.46967ZM9.03033 7.96967C8.73744 7.67678 8.26256 7.67678 7.96967 7.96967C7.67678 8.26256 7.67678 8.73744 7.96967 9.03033L10.9393 12L7.96967 14.9697C7.67678 15.2626 7.67678 15.7374 7.96967 16.0303C8.26256 16.3232 8.73744 16.3232 9.03033 16.0303L12 13.0607L14.9697 16.0303C15.2626 16.3232 15.7374 16.3232 16.0303 16.0303C16.3232 15.7374 16.3232 15.2626 16.0303 14.9697L13.0607 12L16.0303 9.03033C16.3232 8.73744 16.3232 8.26256 16.0303 7.96967C15.7374 7.67678 15.2626 7.67678 14.9697 7.96967L12 10.9393L9.03033 7.96967Z" fill="var(--ds-color-base-default)"/>
                            </svg>
                        </i>
                    </span>
            </summary>
            <div th:id="${interaction.id}"
                 th:aria-labelledby="'header' + ${interaction.id}"
                 data-bs-parent="#protocolTrace">
                <div class="ds-paragraph">
                    <pre th:text="${interaction.interaction}"/>

                    <button type="button" class="ds-button protocoltrace-copy-button" aria-label="Kopier"
                            role="button" data-tooltip="Kopier" data-placement="top" data-autoplacement="true"
                            title="Kopier" th:copytext="${interaction.interaction}">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path fill-rule="evenodd" clip-rule="evenodd" d="M13 2.25C13.1381 2.25 13.25 2.36193 13.25 2.5V7.5C13.25 8.19036 13.8096 8.75 14.5 8.75H19.5C19.6381 8.75 19.75 8.86193 19.75 9V16.5C19.75 17.1904 19.1904 17.75 18.5 17.75H9.5C8.80964 17.75 8.25 17.1904 8.25 16.5V3.5C8.25 2.80964 8.80964 2.25 9.5 2.25H13ZM15.1768 3.11612C15.0193 2.95863 14.75 3.07017 14.75 3.29289V7C14.75 7.13807 14.8619 7.25 15 7.25H18.7071C18.9298 7.25 19.0414 6.98071 18.8839 6.82322L15.1768 3.11612ZM6.75 6.5C6.75 6.36193 6.63807 6.25 6.5 6.25H5.5C4.80964 6.25 4.25 6.80964 4.25 7.5V20.5C4.25 21.1904 4.80964 21.75 5.5 21.75H14.5C15.1904 21.75 15.75 21.1904 15.75 20.5V19.5C15.75 19.3619 15.6381 19.25 15.5 19.25H9.5C7.98122 19.25 6.75 18.0188 6.75 16.5V6.5Z" fill="currentColor"/>
                        </svg>
                    </button>

                </div>
            </div>
    </details>
    </div>
</div>
</body>
</html>

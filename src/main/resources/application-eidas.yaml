---
spring:
  application:
    name: eidas-oidc-demo-client

oidc-demo-client:
  features:
    authorization-details-enabled: true
  theme:
    user-id-claim: pid
    heading: Login with EIDAS
    form-defaults:
      scope: openid profile
      acr-value: eidas-loa-substantial
      supported-acr-values:
            - eidas-loa-substantial
            - eidas-loa-high
      ui-locale: nb
